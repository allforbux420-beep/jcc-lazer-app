<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>JCC Lazer</title>

<style>
body {
    margin:0;
    font-family:Arial, sans-serif;
    background: linear-gradient(135deg,#1a1a1a,#3a2a24);
    color:#fff;
}

.header {
    text-align:center;
    padding:20px;
    font-size:22px;
}

.hero {
    text-align:center;
    padding:80px 20px;
}

.btn {
    background:#ff5a00;
    padding:14px 20px;
    border:none;
    border-radius:8px;
    color:#fff;
    cursor:pointer;
}

/* CHAT */
#chatToggle {
    position: fixed;
    bottom: 40px;
    right: 20px;
    background: #ff5a00;
    padding: 14px 20px;
    border-radius: 50px;
    cursor: pointer;
}

#chatBox {
    position: fixed;
    bottom: 110px;
    right: 20px;
    width: 320px;
    height: 420px;
    background: #1a1a1a;
    border-radius: 16px;
    display: none;
    flex-direction: column;
}

.chat-header {
    padding: 12px;
    background: #111;
}

.chat-body {
    flex:1;
    padding:10px;
    overflow-y:auto;
}

.message {
    margin:8px 0;
    padding:10px;
    border-radius:10px;
    max-width:80%;
}

.bot { background:#2a2a2a; }
.user { background:#ff5a00; margin-left:auto; }

.chat-input {
    display:flex;
}

.chat-input input {
    flex:1;
    padding:10px;
    border:none;
    background:#111;
    color:#fff;
}

.chat-input button {
    background:#ff5a00;
    border:none;
    color:#fff;
    padding:10px;
}
</style>

</head>

<body>

<div class="header">JCC Lazer</div>

<div class="hero">
    <h1>Custom Lazer Engraving That Lasts</h1>
    <p>Slate • Wood • Glass • Tumblers</p>
    <button class="btn" onclick="startOrder()">Start Your Order</button>
</div>

<div id="chatToggle" onclick="openChat()">💬 Support</div>

<div id="chatBox">
    <div class="chat-header">JCC Lazer Support</div>

    <div class="chat-body" id="chat">
        <div class="message bot">Hi! What would you like engraved?</div>
    </div>

    <div class="chat-input">
        <input id="input" placeholder="Type your message..." />
        <button onclick="send()">Send</button>
    </div>
</div>

<script>
const box = document.getElementById("chatBox");
const chat = document.getElementById("chat");
const input = document.getElementById("input");

function openChat() {
    box.style.display = box.style.display === "flex" ? "none" : "flex";
}

function startOrder(){
    box.style.display = "flex";
}

function send(){
    let text = input.value.trim();
    if(!text) return;

    input.value = "";

    // show user message
    chat.innerHTML += `<div class="message user">${text}</div>`;
    chat.scrollTop = chat.scrollHeight;

    // send to backend
    fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text })
    })
    .then(res => res.json())
    .then(data => {
        chat.innerHTML += `<div class="message bot">${data.reply}</div>`;
        chat.scrollTop = chat.scrollHeight;
    })
    .catch(() => {
        chat.innerHTML += `<div class="message bot">Server error</div>`;
    });
}
</script>

</body>
</html>
