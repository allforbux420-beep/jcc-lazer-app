<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>JCC Laser</title>

<style>
body {
    margin:0;
    font-family:Arial, sans-serif;
    background:#f5f5f5;
    color:#111;
}

.header {
    text-align:center;
    padding:20px;
    font-size:22px;
    background:#fff;
    border-bottom:1px solid #ddd;
}

.hero {
    background: linear-gradient(135deg,#1a1a1a,#3a2a24);
    color:#fff;
    padding:80px 20px;
    text-align:center;
}

.hero h1 {
    font-size:42px;
}

.btn {
    background:#ff5a00;
    padding:14px 22px;
    border:none;
    border-radius:8px;
    color:#fff;
    cursor:pointer;
}

.section {
    background:#fff;
    padding:40px;
    border-radius:12px;
    margin:40px auto;
    max-width:1100px;
    box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

/* CHAT */
#chatToggle {
    position:fixed;
    bottom:40px;
    right:20px;
    background:#ff5a00;
    color:#fff;
    padding:14px 20px;
    border-radius:50px;
    cursor:pointer;
    z-index:999999;
}

#chatBox {
    position:fixed;
    bottom:110px;
    right:20px;
    width:320px;
    height:420px;
    background:#1a1a1a;
    border-radius:12px;
    display:none;
    flex-direction:column;
    overflow:hidden;
}

.chat-header {
    padding:12px;
    background:#111;
    color:#fff;
}

.chat-body {
    flex:1;
    padding:10px;
    overflow-y:auto;
    font-size:14px;
}

.message {
    margin:8px 0;
    padding:10px;
    border-radius:10px;
    max-width:80%;
}

.bot {
    background:#2a2a2a;
    color:#ccc;
}

.user {
    margin-left:auto;
    background:#ff5a00;
    color:#fff;
}

.chat-input {
    display:flex;
}

.chat-input input {
    flex:1;
    padding:10px;
    border:none;
    background:#111;
    color:#fff;
}

.chat-input button {
    background:#ff5a00;
    border:none;
    color:#fff;
    padding:10px;
}
</style>
</head>

<body>

<div class="header">JCC Laser</div>

<div class="hero">
    <h1>Custom Laser Engraving That Lasts</h1>
    <p>Slate • Wood • Glass • Tumblers</p>
    <br>
    <button class="btn" onclick="startOrder()">Start Your Order</button>
</div>

<div class="section">
    <h2>Personalized Engraved Slate</h2>
    <p>Upload your photo and we engrave it permanently.</p>
</div>

<div id="chatToggle">💬 Support</div>

<div id="chatBox">
    <div class="chat-header">JCC Laser Support</div>

    <div class="chat-body" id="chat">
        <div class="message bot">Hi! What would you like engraved?</div>
    </div>

    <div class="chat-input">
        <input id="input" placeholder="Type your message..." />
        <button onclick="send()">Send</button>
    </div>
</div>

<script>
let order = {};

const toggle = document.getElementById("chatToggle");
const box = document.getElementById("chatBox");
const chat = document.getElementById("chat");
const input = document.getElementById("input");

toggle.onclick = () => {
    box.style.display = box.style.display==="flex"?"none":"flex";
};

function startOrder(){
    box.style.display="flex";
}

/* CHAT FLOW */
function send(){
    let text = input.value.trim();
    if(!text) return;

    input.value="";
    chat.innerHTML += `<div class="message user">${text}</div>`;
    chat.scrollTop = chat.scrollHeight;

    if(!order.item){
        order.item = text;
        chat.innerHTML += `<div class="message bot">What size? (4x6 or 8x10)</div>`;
        return;
    }

    if(!order.size){
        order.size = text;
        order.price = text.includes("8") ? 45 : 25;
        chat.innerHTML += `<div class="message bot">What name should we put?</div>`;
        return;
    }

    if(!order.name){
        order.name = text;

        chat.innerHTML += `
        <div class="message bot">
        Upload your image (optional):<br><br>
        <input type="file" accept="image/*" onchange="handleUpload(event)">
        <br><br>
        <button onclick="skipUpload()">Skip</button>
        </div>`;
        return;
    }
}

/* IMAGE UPLOAD */
function handleUpload(event){
    const file = event.target.files[0];
    if(!file) return;

    const reader = new FileReader();

    reader.onload = function(e){
        order.image = e.target.result;

        chat.innerHTML += `
        <div class="message user">[Image uploaded]</div>
        <div class="message bot">
            <img src="${order.image}" style="max-width:100%;border-radius:8px;">
        </div>
        `;

        showSummary();
    };

    reader.readAsDataURL(file);
}

function skipUpload(){
    showSummary();
}

function showSummary(){
    chat.innerHTML += `
    <div class="message bot">
    <strong>Order Summary:</strong><br>
    ${order.item}<br>
    ${order.size}<br>
    $${order.price}<br><br>
    <button onclick="checkout()">Checkout</button>
    </div>`;
}

/* CHECKOUT */
function checkout(){
    fetch("/create-checkout-session",{
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body: JSON.stringify(order)
    })
    .then(res=>res.json())
    .then(data=>{
        window.location = data.url;
    });
}

/* SUCCESS / CANCEL */
const params = new URLSearchParams(window.location.search);

if (params.get("success")) {
    chat.innerHTML += `<div class="message bot">✅ Payment received! Your order is in production.</div>`;
}

if (params.get("cancel")) {
    chat.innerHTML += `<div class="message bot">❌ Checkout canceled.</div>`;
}
</script>

</body>
</html>
