<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>JCC Lazer Tracker</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
  box-sizing:border-box;
}

body{
  margin:0;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#050505;
  font-family:Poppins;
  color:#fff;
  overflow:hidden;
}

/* BACKGROUND GLOW */
body::before{
  content:"";
  position:fixed;
  width:500px;
  height:500px;
  background:rgba(255,90,0,0.15);
  filter:blur(120px);
  border-radius:50%;
  bottom:-200px;
  left:-150px;
}

/* CARD */
.card{
  width:380px;
  background:#0b0b0b;
  border-radius:28px;
  padding:35px;
  border:1px solid rgba(255,255,255,0.04);
  box-shadow:
    0 0 0 1px rgba(255,255,255,0.03),
    0 20px 60px rgba(0,0,0,0.6);
  position:relative;
}

/* HEADER */
.logo{
  text-align:center;
  font-size:24px;
  font-weight:700;
  letter-spacing:1px;
}

.sub{
  text-align:center;
  margin-top:8px;
  color:#8b8b8b;
  font-size:16px;
}

/* INPUT */
input{
  width:100%;
  margin-top:28px;
  background:#0d0d0d;
  border:1px solid #1e1e1e;
  border-radius:14px;
  padding:16px;
  color:#fff;
  font-size:15px;
  outline:none;
}

input:focus{
  border-color:#ff5a00;
}

/* BUTTON */
button{
  width:100%;
  margin-top:16px;
  border:none;
  background:#ff5a00;
  color:#fff;
  padding:16px;
  border-radius:14px;
  font-size:16px;
  font-weight:600;
  cursor:pointer;
  transition:0.2s;
}

button:hover{
  transform:translateY(-2px);
  background:#ff6f1f;
}

/* INFO TEXT */
.info{
  text-align:center;
  margin-top:16px;
  color:#9a9a9a;
  font-size:14px;
}

/* TIMER CIRCLE */
.circleWrap{
  width:90px;
  height:90px;
  margin:28px auto 18px auto;
  position:relative;
}

.circle{
  width:90px;
  height:90px;
  border-radius:50%;
  background:
    conic-gradient(#ff5a00 0deg,
    #ff5a00 90deg,
    #1d1d1d 90deg);
  display:flex;
  align-items:center;
  justify-content:center;
  animation:spin 2s linear infinite;
}

.circle::before{
  content:"";
  width:62px;
  height:62px;
  border-radius:50%;
  background:#0b0b0b;
}

@keyframes spin{
  from{transform:rotate(0deg);}
  to{transform:rotate(360deg);}
}

/* PROGRESS BAR */
.bar{
  width:100%;
  height:10px;
  background:#1a1a1a;
  border-radius:20px;
  overflow:hidden;
  margin-top:20px;
}

.progress{
  width:0%;
  height:100%;
  background:linear-gradient(90deg,#ff5a00,#ff7b00);
  border-radius:20px;
  transition:0.5s;
}

/* STATUS */
.status{
  text-align:center;
  margin-top:18px;
  font-size:18px;
  font-weight:500;
}

/* TRACKING */
.tracking{
  text-align:center;
  margin-top:10px;
  color:#ff8c42;
  font-size:14px;
  word-break:break-word;
}

/* FOOTER */
.footer{
  text-align:center;
  margin-top:28px;
  font-size:15px;
  color:#d9d9d9;
}

.footer span{
  color:#ff5a00;
}

/* RESULT */
#resultBox{
  display:none;
}

</style>
</head>

<body>

<div class="card">

  <div class="logo">JCC LAZER</div>
  <div class="sub">Order Tracking</div>

  <input id="orderInput" placeholder="Enter Order ID">

  <button onclick="searchOrder()">Track Order</button>

  <div class="info">
    Timer begins when your order is placed ⏳
  </div>

  <div class="circleWrap">
    <div class="circle"></div>
  </div>

  <div class="bar">
    <div id="prog" class="progress"></div>
  </div>

  <div id="resultBox">

    <div id="status" class="status"></div>

    <div id="tracking" class="tracking"></div>

  </div>

  <div class="footer">
    🚚 <span>Out the door before this timer ends!</span>
  </div>

</div>

<script>

async function searchOrder(){

  const id = document.getElementById("orderInput").value.trim();

  if(!id){
    alert("Enter Order ID");
    return;
  }

  const res = await fetch("/track-order/" + id);
  const d = await res.json();

  document.getElementById("resultBox").style.display = "block";

  if(d.error){

    document.getElementById("status").innerText =
      "Order not found";

    document.getElementById("tracking").innerText = "";

    document.getElementById("prog").style.width = "0%";

    return;
  }

  /* STATUS */
  document.getElementById("status").innerText =
    d.status || "Processing";

  /* PROGRESS */
  document.getElementById("prog").style.width =
    (d.progress || 0) + "%";

  /* TRACKING */
  if(d.tracking){

    let link = "";

    if(d.tracking.startsWith("1Z")){
      link = `https://www.ups.com/track?tracknum=${d.tracking}`;
    }
    else if(d.tracking.startsWith("9")){
      link = `https://tools.usps.com/go/TrackConfirmAction?tLabels=${d.tracking}`;
    }

    if(link){
      document.getElementById("tracking").innerHTML =
        `<a href="${link}" target="_blank" style="color:#ff8c42;text-decoration:none;">
          Tracking: ${d.tracking}
        </a>`;
    } else {
      document.getElementById("tracking").innerText =
        "Tracking: " + d.tracking;
    }

  } else {

    document.getElementById("tracking").innerText =
      "Tracking not available";

  }
}

/* ENTER KEY */
document.getElementById("orderInput")
.addEventListener("keydown", function(e){

  if(e.key === "Enter"){
    searchOrder();
  }

});

</script>

</body>
</html>
