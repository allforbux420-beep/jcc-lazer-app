<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>JCC Laser</title>

<style>
body {
    margin:0;
    font-family:Arial, sans-serif;
    background: linear-gradient(135deg,#1a1a1a,#3a2a24);
    color:#fff;
}

.header {
    text-align:center;
    padding:20px;
    font-size:22px;
    border-bottom:1px solid #222;
}

.hero {
    text-align:center;
    padding:80px 20px;
}

.hero h1 {
    font-size:40px;
}

.btn {
    background:#ff5a00;
    padding:14px 20px;
    border:none;
    border-radius:8px;
    color:#fff;
    cursor:pointer;
}

.section {
    background:#fff;
    padding:40px;
    border-radius:12px;
    margin:40px auto;
    max-width:1100px;
    box-shadow:0 10px 30px rgba(0,0,0,0.1);
    color:#000;
}

/* CHAT */
#jcc-chat {
    position: fixed;
    bottom: 20px;
    right: 20px;
    width: 320px;
    background: #1a1a1a;
    border-radius: 16px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    overflow: hidden;
}

.chat-header {
    padding: 12px;
    background: #111;
    font-weight: bold;
}

.chat-body {
    height: 300px;
    overflow-y: auto;
    padding: 10px;
}

.message {
    margin: 8px 0;
    padding: 10px;
    border-radius: 10px;
    max-width: 80%;
}

.bot {
    background: #2a2a2a;
}

.user {
    background: #ff5a00;
    margin-left: auto;
    text-align: right;
}

.chat-input {
    display: flex;
}

.chat-input input {
    flex: 1;
    padding: 10px;
    border: none;
    background: #111;
    color: #fff;
}

.chat-input button {
    background: #ff5a00;
    border: none;
    color: #fff;
    padding: 10px;
}

#imageUpload {
    width:100%;
    background:#111;
    color:#fff;
    padding:8px;
    border:none;
}
</style>
</head>

<body>

<div class="header">JCC Laser</div>

<div class="hero">
    <h1>Custom Laser Engraving That Lasts</h1>
    <p>Slate • Wood • Glass • Tumblers</p>
    <button class="btn" onclick="openChat()">Start Your Order</button>
</div>

<div class="section">
    <h2>Premium Custom Engraving</h2>
    <p>Upload your design, choose your size, and we’ll laser engrave it permanently.</p>
</div>

<!-- CHAT -->
<div id="jcc-chat" style="display:none;">
    <div class="chat-header">JCC Laser Support</div>

    <div class="chat-body" id="chat">
        <div class="message bot">What would you like engraved?</div>
    </div>

    <!-- IMAGE UPLOAD -->
    <input type="file" id="imageUpload" accept="image/*">

    <div class="chat-input">
        <input id="input" placeholder="Type your message...">
        <button onclick="send()">Send</button>
    </div>
</div>

<script>
let order = {};
let uploadedImage = null;

function openChat(){
    document.getElementById("jcc-chat").style.display = "block";
}

// IMAGE TO BASE64
document.getElementById("imageUpload").addEventListener("change", function(e){
    const file = e.target.files[0];
    const reader = new FileReader();

    reader.onloadend = function(){
        uploadedImage = reader.result;
    };

    if(file){
        reader.readAsDataURL(file);
    }
});

const chat = document.getElementById("chat");
const input = document.getElementById("input");

// CHAT FLOW
function send(){
    let text = input.value.trim();
    if(!text) return;

    input.value = "";

    chat.innerHTML += `<div class="message user">${text}</div>`;
    chat.scrollTop = chat.scrollHeight;

    if(!order.item){
        order.item = text;
        chat.innerHTML += `<div class="message bot">What size? (4x6 or 8x10)</div>`;
        return;
    }

    if(!order.size){
        order.size = text;
        order.price = text.includes("8") ? 45 : 25;
        chat.innerHTML += `<div class="message bot">What name should we put?</div>`;
        return;
    }

    if(!order.name){
        order.name = text;

        chat.innerHTML += `
        <div class="message bot">
        <strong>Order Summary:</strong><br>
        ${order.item}<br>
        ${order.size}<br>
        $${order.price}<br><br>
        <button onclick="checkout()">Checkout</button>
        </div>`;
        return;
    }
}

// CHECKOUT
async function checkout(){
    const res = await fetch("/create-checkout-session", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            item: order.item,
            size: order.size,
            price: order.price,
            name: order.name,
            image: uploadedImage
        })
    });

    const data = await res.json();
    window.location = data.url;
}
</script>

</body>
</html>
