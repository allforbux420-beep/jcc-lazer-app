<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Track Your Order - JCC Lazer</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#050505;
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
background-image:url('https://www.jcclazer.com/storage/13082/a19dcff3-ef46-49cd-b3b6-3d6c19cdb558/welcome_logo69ecf51bd09ee.png');
background-size:cover;
background-position:center;
}

.tracker-box{
width:90%;
max-width:500px;
background:rgba(0,0,0,0.88);
padding:40px;
border-radius:24px;
box-shadow:0 0 30px rgba(255,102,0,0.4);
}

h1{
text-align:center;
font-size:42px;
margin-bottom:10px;
color:#ff6600;
}

p{
text-align:center;
color:#ccc;
margin-bottom:25px;
}

input{
width:100%;
padding:16px;
border:none;
border-radius:14px;
background:#111;
color:white;
font-size:18px;
margin-bottom:20px;
}

button{
width:100%;
padding:16px;
border:none;
border-radius:14px;
background:#ff6600;
color:white;
font-size:20px;
font-weight:bold;
cursor:pointer;
transition:.3s;
}

button:hover{
background:#ff7b1a;
transform:scale(1.02);
}

#trackingStatus{
margin-top:25px;
font-size:18px;
line-height:1.6;
text-align:center;
}

.progress-bar{
width:100%;
height:16px;
background:#222;
border-radius:30px;
overflow:hidden;
margin-top:25px;
}

.progress-fill{
height:100%;
width:0%;
background:linear-gradient(90deg,#ff6600,#ffaa33);
transition:1s;
}

</style>
</head>

<body>

<div class="tracker-box">

<h1>Track Order</h1>

<p>Enter your order ID below</p>

<input id="orderInput" type="text" placeholder="Enter Order ID">

<button onclick="trackOrder()">Track Order</button>

<div id="trackingStatus">
Waiting for tracking update...
</div>

<div class="progress-bar">
<div id="progressFill" class="progress-fill"></div>
</div>

</div>

<script>

async function trackOrder() {

const orderId = document.getElementById("orderInput").value.trim();

const statusBox = document.getElementById("trackingStatus");

const progressFill = document.getElementById("progressFill");

statusBox.innerHTML = "Searching order...";

try {

const response = await fetch("https://docs.google.com/spreadsheets/d/1a4HCDTu-Ai1tXunxGTRh0xDCkqLs22YIkYu6yO_-OjE/edit?usp=sharing");

const data = await response.json();

const order = data.find(item => item.OrderID === orderId);

if(order){

let stageText = "";
let progress = "0%";

switch(order.Stage){

case "1":
stageText = "Order received.";
progress = "15%";
break;

case "2":
stageText = "Preparing design.";
progress = "35%";
break;

case "3":
stageText = "Currently engraving.";
progress = "65%";
break;

case "4":
stageText = "Ready to ship.";
progress = "85%";
break;

case "5":
stageText = "Package shipped.";
progress = "100%";
break;

default:
stageText = "Unknown tracking stage.";

}

statusBox.innerHTML = `
<strong>${order.Name}</strong><br>
${stageText}<br><br>
Order Date: ${order.OrderDate}
`;

progressFill.style.width = progress;

} else {

statusBox.innerHTML = "Order ID not found.";

progressFill.style.width = "0%";

}

} catch(error){

statusBox.innerHTML = "Tracker offline.";

}

}

</script>

</body>
</html>
