<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>JCC Lazer</title>

<style>
body {
    margin:0;
    font-family:Arial, sans-serif;
    background: linear-gradient(135deg,#1a1a1a,#3a2a24);
    color:#fff;
}

.header {
    text-align:center;
    padding:20px;
    font-size:22px;
    border-bottom:1px solid #222;
}

.hero {
    display:flex;
    justify-content:center;
    align-items:center;
    padding:80px 20px;
    text-align:center;
}

.hero h1 {
    font-size:40px;
}

.btn {
    background:#ff5a00;
    padding:14px 20px;
    border:none;
    border-radius:8px;
    color:#fff;
    cursor:pointer;
}

/* CHAT */
#chatToggle {
    position: fixed;
    bottom: 40px;
    right: 20px;
    background: #ff5a00;
    padding: 14px 20px;
    border-radius: 50px;
    cursor: pointer;
    z-index: 9999;
}

#chatBox {
    position: fixed;
    bottom: 110px;
    right: 20px;
    width: 320px;
    height: 420px;
    background: #1a1a1a;
    border-radius: 16px;
    display: none;
    flex-direction: column;
    overflow: hidden;
    z-index: 9999;
}

.chat-header {
    padding: 12px;
    background: #111;
    border-bottom: 1px solid #222;
}

.chat-body {
    flex: 1;
    padding: 10px;
    overflow-y: auto;
}

.message {
    margin: 8px 0;
    padding: 10px;
    border-radius: 10px;
    max-width: 80%;
}

.bot { background:#2a2a2a; color:#ccc; }
.user { background:#ff5a00; margin-left:auto; }

.chat-input {
    display:flex;
}

.chat-input input {
    flex:1;
    padding:10px;
    border:none;
    background:#111;
    color:#fff;
}

.chat-input button {
    background:#ff5a00;
    border:none;
    color:#fff;
    padding:10px;
    cursor:pointer;
}

img.preview {
    width:100%;
    margin-top:8px;
    border-radius:10px;
}
</style>

</head>

<body>

<div class="header">JCC Laser</div>

<div class="hero">
    <div>
        <h1>Custom Laser Engraving That Lasts</h1>
        <p>Slate • Wood • Glass • Tumblers</p>
        <button class="btn" onclick="startOrder()">Start Your Order</button>
    </div>
</div>

<div id="chatToggle">💬 Support</div>

<div id="chatBox">
    <div class="chat-header">JCC Laser Support</div>

```
<div class="chat-body" id="chat">
    <div class="message bot">Hi! What would you like engraved?</div>
</div>

<div class="chat-input">
    <input id="input" placeholder="Type your message..." />
    <button onclick="send()">Send</button>
</div>
```

</div>

<script>
let order = {};
let uploadedImage = null;

const toggle = document.getElementById("chatToggle");
const box = document.getElementById("chatBox");
const chat = document.getElementById("chat");
const input = document.getElementById("input");

toggle.onclick = () => {
    box.style.display = box.style.display === "flex" ? "none" : "flex";
};

function startOrder(){
    box.style.display = "flex";
}

function add(msg, type="bot"){
    chat.innerHTML += `<div class="message ${type}">${msg}</div>`;
    chat.scrollTop = chat.scrollHeight;
}

function send(){
    let text = input.value.trim();
    if(!text) return;

    input.value = "";
    add(text,"user");

    if(!order.item){
        order.item = text;
        add("What size? (4x6 or 8x10)");
        return;
    }

    if(!order.size){
        order.size = text;
        order.price = text.includes("8") ? 45 : 25;
        add("What would you like engraved?");
        return;
    }

    if(!order.design){
        order.design = text;
        add("What name should we put?");
        return;
    }

    if(!order.name){
        order.name = text;

        add('Upload your image:<br><input type="file" id="fileInput">');

        setTimeout(() => {
            document.getElementById("fileInput").onchange = function(e){
                const file = e.target.files[0];

                const reader = new FileReader();
                reader.onload = function(evt){
                    uploadedImage = evt.target.result;
                    add('<img src="' + uploadedImage + '" class="preview">');
                    showCheckout();
                };
                reader.readAsDataURL(file);
            };
        }, 100);

        return;
    }
}

function showCheckout(){
    add(
        "<strong>Order Summary:</strong><br>" +
        order.item + "<br>" +
        order.size + "<br>$" +
        order.price +
        "<br><br><button onclick='checkout()'>Checkout</button>"
    );
}

async function checkout(){
    try{
        const res = await fetch("/create-checkout-session", {
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify({
                ...order,
                image: uploadedImage
            })
        });

        const data = await res.json();
        window.location = data.url;

    }catch(e){
        alert("Checkout failed");
        console.error(e);
    }
}
// SHOW SUCCESS MESSAGE AFTER PAYMENT
const urlParams = new URLSearchParams(window.location.search);

if (urlParams.get("success")) {
    setTimeout(() => {
        box.style.display = "flex";
        add("✅ Order placed successfully! We'll start working on it.");
    }, 500);
}

if (urlParams.get("cancel")) {
    setTimeout(() => {
        box.style.display = "flex";
        add("❌ Payment canceled. You can try again anytime.");
    }, 500);
}
</script>

</body>
</html>
