<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>JCC Laser</title>

<style>
/* =========================
   BASE
========================= */
body {
    margin:0;
    font-family:Arial, sans-serif;
    background: linear-gradient(135deg,#1a1a1a,#3a2a24);
    color:#fff;
}

.header {
    text-align:center;
    padding:20px;
    font-size:22px;
    border-bottom:1px solid #222;
}

.hero {
    display:flex;
    justify-content:center;
    align-items:center;
    padding:80px 20px;
    text-align:center;
}

.hero h1 {
    font-size:40px;
}

.btn {
    background:#ff5a00;
    padding:14px 20px;
    border:none;
    border-radius:8px;
    color:#fff;
    cursor:pointer;
}

/* =========================
   CHAT (FORCED FIX)
========================= */

/* MAX OVERRIDE */
html body #jcc-chat,
html body #chatToggle,
html body #chatBox {
    position: fixed !important;
    z-index: 2147483647 !important;
    font-family: Arial, sans-serif;
}

/* BUTTON */
#chatToggle {
    bottom: 40px !important;
    right: 20px !important;
    background: #ff5a00;
    color: #fff;
    padding: 14px 20px;
    border-radius: 50px;
    cursor: pointer;
    white-space: nowrap;
}

/* CHAT BOX */
#chatBox {
    bottom: 110px !important;
    right: 20px !important;
    width: 320px;
    height: 420px;
    background: #1a1a1a;
    border-radius: 16px;
    display: none;
    flex-direction: column;
    overflow: hidden;
}

/* HEADER */
.chat-header {
    padding: 12px;
    background: #111;
    border-bottom: 1px solid #222;
}

/* BODY */
.chat-body {
    flex: 1;
    padding: 10px;
    overflow-y: auto;
    font-size: 14px;
}

/* MESSAGES */
.message {
    margin: 8px 0;
    padding: 10px;
    border-radius: 10px;
    max-width: 80%;
    word-wrap: break-word;
}

.bot {
    background: #2a2a2a;
    color: #ccc;
}

.user {
    margin-left: auto;
    background: #ff5a00;
    color: #fff;
}

/* INPUT */
.chat-input {
    display: flex;
}

.chat-input input {
    flex: 1;
    padding: 10px;
    border: none;
    background: #111;
    color: #fff;
}

.chat-input button {
    background: #ff5a00;
    border: none;
    color: #fff;
    padding: 10px;
}
</style>
</head>

<body>

<div class="header">JCC Laser</div>

<div class="hero">
    <div>
        <h1>Custom Laser Engraving That Lasts</h1>
        <p>Slate • Wood • Glass • Tumblers</p>
        <button class="btn" onclick="startOrder()">Start Your Order</button>
    </div>
</div>

<!-- CHAT (VERY IMPORTANT: KEEP AT BOTTOM) -->
<div id="jcc-chat">

    <div id="chatToggle">💬 Support</div>

    <div id="chatBox">
        <div class="chat-header">JCC Laser Support</div>

        <div class="chat-body" id="chat">
            <div class="message bot">
                Hi! What would you like engraved?
            </div>
        </div>

        <div class="chat-input">
            <input id="input" placeholder="Type your message..." />
            <button onclick="send()">Send</button>
        </div>
    </div>

</div>

<script>
let order = {};

const toggle = document.getElementById("chatToggle");
const box = document.getElementById("chatBox");
const chat = document.getElementById("chat");
const input = document.getElementById("input");

/* FIX CLICK (builder safe) */
document.addEventListener("DOMContentLoaded", () => {
    toggle.addEventListener("click", () => {
        box.style.display = box.style.display === "flex" ? "none" : "flex";
    });
});

/* open from button */
function startOrder(){
    box.style.display = "flex";
}

/* chat flow */
function send(){
    let text = input.value.trim();
    if(!text) return;

    input.value = "";

    chat.innerHTML += `<div class="message user">${text}</div>`;
    chat.scrollTop = chat.scrollHeight;

    if(!order.item){
        order.item = text;
        chat.innerHTML += `<div class="message bot">What size? (4x6 or 8x10)</div>`;
        return;
    }

    if(!order.size){
        order.size = text;
        order.price = text.includes("8") ? 45 : 25;

        chat.innerHTML += `<div class="message bot">What would you like engraved?</div>`;
        return;
    }

    if(!order.design){
        order.design = text;
        chat.innerHTML += `<div class="message bot">What name should we put?</div>`;
        return;
    }

    if(!order.name){
        order.name = text;

        chat.innerHTML += `
        <div class="message bot">
        <strong>Order Summary:</strong><br>
        ${order.item}<br>
        ${order.size}<br>
        $${order.price}<br><br>
        <button onclick="checkout()">Checkout</button>
        </div>`;
        return;
    }
}
</script>

</body>
</html>
